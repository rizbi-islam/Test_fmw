name: KWAF CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  verify-and-test:
    runs-on: ubuntu-22.04

    steps:
      # ── Checkout ───────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Python Setup ───────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── Install Dependencies ───────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Install Playwright Browsers + OS deps ──────────────
      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      # ── Create Test Template ───────────────────────────────
      - name: Create Excel test template
        run: python assets/templates/create_template.py

      # ── Phase 1 Verification ───────────────────────────────
      - name: Run Phase 1 verification
        run: python tests/verify_phase1.py

      # ── Phase 2 Verification ───────────────────────────────
      - name: Run Phase 2 verification
        run: python tests/verify_phase2.py

      # ── Phase 3 Verification ───────────────────────────────
      - name: Run Phase 3 verification
        run: python tests/verify_phase3.py

      # ── Smoke Test Run ─────────────────────────────────────
      - name: Run test suite (Playwright headless)
        run: python run.py --driver playwright --headless
        continue-on-error: true

      # ── Upload HTML Report ─────────────────────────────────
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kwaf-test-report-${{ github.run_number }}
          path: reports/output/*.html
          retention-days: 30

      # ── Upload Screenshots ─────────────────────────────────
      - name: Upload failure screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kwaf-screenshots-${{ github.run_number }}
          path: assets/screenshots/
          retention-days: 7
          if-no-files-found: ignore
